# A generic, single-database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names; The default template is:
# file_template = %%(rev)s_%%(slug)s
# Note: %% signs are escaped as double %%
file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date within the migration file
# timezone = UTC

# max length of characters to use for "slug" in filename
truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow empty revisions to be created
# (e.g. no SQL statements generated by autogenerate)
# allow_empty_history = false

# version locations config
# version_locations = %(here)s/bar:%(here)s/bat

# version path separator; default is OS line separator
# version_path_separator = os

# the database URL is loaded dynamically in env.py from settings, but set here as a default reference
sqlalchemy.url = postgresql+asyncpg://neuromesh:neuromesh_secure_pass@localhost:5432/neuromesh_db

[post_write_hooks]
# post_write_hooks defines scripts or cleanup that are run after a revision is generated.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
datefmt = %H:%M:%S
